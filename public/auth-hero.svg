      <rect x="114" y="60" width="54" height="38" rx="8"/>
      <rect x="178" y="60" width="54" height="38" rx="8"/>
      <rect x="242" y="60" width="54" height="38" rx="8"/>
      <rect x="306" y="60" width="54" height="38" rx="8"/>
      <rect x="370" y="60" width="54" height="38" rx="8"/>
      <rect x="434" y="60" width="54" height="38" rx="8"/>
      <rect x="498" y="60" width="54" height="38" rx="8"/>

      <rect x="50" y="110" width="54" height="38" rx="8"/>
      <rect x="114" y="110" width="54" height="38" rx="8"/>
      <rect x="178" y="110" width="54" height="38" rx="8"/>
      <rect x="242" y="110" width="54" height="38" rx="8"/>
      <rect x="306" y="110" width="54" height="38" rx="8"/>
      <rect x="370" y="110" width="54" height="38" rx="8"/>
      <rect x="434" y="110" width="54" height="38" rx="8"/>
      <rect x="498" y="110" width="54" height="38" rx="8"/>

      <rect x="50" y="160" width="76" height="38" rx="8"/>
      <rect x="136" y="160" width="54" height="38" rx="8"/>
